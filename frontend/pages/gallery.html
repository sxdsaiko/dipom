<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Фотогалерея — WanderLog</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <style>
    /* Masonry */
    .masonry { columns: 3; column-gap: 14px; }
    .masonry-item { break-inside: avoid; margin-bottom: 14px; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; }
    .masonry-item img { width: 100%; display: block; transition: transform .5s var(--ease-expo); }
    .masonry-item:hover img { transform: scale(1.04); }
    .masonry-item__overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 55%);
      opacity: 0; transition: opacity .3s;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 14px;
    }
    .masonry-item:hover .masonry-item__overlay { opacity: 1; }
    .masonry-item__caption { color: #fff; font-size: 0.82rem; margin-bottom: 5px; font-weight: 500; }
    .masonry-item__actions { display: flex; gap: 10px; }
    .masonry-item__actions button { color: rgba(255,255,255,0.8); font-size: 0.75rem; display: flex; align-items: center; gap: 4px; transition: color .2s; }
    .masonry-item__actions button:hover { color: #fff; }
    .masonry-item__trip-tag { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.55); backdrop-filter: blur(4px); color: #fff; padding: 3px 9px; border-radius: 100px; font-size: 0.68rem; font-family: var(--font-mono); }

    /* Lightbox */
    .lightbox { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.97); display: none; }
    .lightbox.open { display: flex; align-items: center; justify-content: center; }
    /* Курсор виден в lightbox */
    .lightbox * { cursor: default; }
    .lightbox .cursor, .lightbox .cursor-dot { display: none; }
    .lb-close { position: absolute; top: 20px; right: 24px; color: rgba(255,255,255,0.6); font-size: 2rem; z-index: 2; transition: color .2s; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; }
    .lb-close:hover { color: #fff; background: rgba(255,255,255,0.1); }
    .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); font-size: 3rem; z-index: 2; padding: 20px; transition: color .2s; cursor: pointer; border-radius: 8px; }
    .lb-nav:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .lb-prev { left: 0; } .lb-next { right: 0; }
    .lb-content { display: flex; max-width: 1100px; width: 100%; max-height: 92vh; gap: 0; }
    .lb-img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; padding: 20px 60px; }
    .lb-img-wrap img { max-height: 88vh; max-width: 100%; object-fit: contain; border-radius: 4px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .lb-info { width: 260px; flex-shrink: 0; background: rgba(255,255,255,0.04); border-left: 1px solid rgba(255,255,255,0.07); padding: 32px 24px; display: flex; flex-direction: column; gap: 14px; }
    .lb-info__caption { font-family: var(--font-serif); font-size: 1.1rem; color: #fff; }
    .lb-info__meta { font-size: 0.75rem; color: rgba(255,255,255,0.4); font-family: var(--font-mono); line-height: 1.9; }
    .lb-info__actions { display: flex; flex-direction: column; gap: 8px; margin-top: auto; }
    .lb-btn { padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); font-size: 0.84rem; text-align: left; transition: all .2s; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .lb-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .lb-btn--delete:hover { background: rgba(155,78,46,0.3); color: #f5a090; border-color: rgba(155,78,46,0.5); }
    .lb-count { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.4); font-size: 0.72rem; font-family: var(--font-mono); letter-spacing: 0.1em; }

    /* Gallery controls */
    .gallery-controls { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
    .gallery-search { flex: 1; min-width: 220px; display: flex; align-items: center; gap: 8px; border: 1.5px solid var(--sand); border-radius: 10px; padding: 9px 14px; background: var(--white); }
    .gallery-search:focus-within { border-color: var(--gold); }
    .gallery-search input { flex: 1; border: none; outline: none; font-family: var(--font-sans); font-size: 0.87rem; background: transparent; }
    .view-btns { display: flex; gap: 3px; background: var(--cream); border-radius: 8px; padding: 3px; }
    .vbtn { padding: 5px 10px; border-radius: 6px; font-size: 1rem; color: var(--mist); transition: all .2s; }
    .vbtn.active { background: var(--white); color: var(--ink); }
    .trip-pills { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 20px; }
    .trip-pill { padding: 6px 14px; border-radius: 100px; border: 1.5px solid var(--sand); font-size: 0.78rem; color: var(--mist); background: var(--white); transition: all .2s; white-space: nowrap; cursor: pointer; }
    .trip-pill.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
    .gallery-stats { display: flex; gap: 20px; margin-bottom: 20px; font-size: 0.83rem; color: var(--mist); }
    .gallery-stats strong { color: var(--ink); }

    /* Upload zone */
    .upload-zone-area { border: 2px dashed var(--sand); border-radius: 14px; padding: 48px 20px; text-align: center; color: var(--mist); transition: all .2s; margin-bottom: 24px; }
    .upload-zone-area.drag { border-color: var(--gold); background: #fdf8f0; }
    .upload-zone-area h3 { font-family: var(--font-serif); font-size: 1.3rem; margin: 12px 0 6px; color: var(--ink); }

    /* Empty state */
    .gallery-empty { text-align: center; padding: 80px 20px; color: var(--mist); }

    @media(max-width:1100px) { .masonry { columns: 2; } .lb-info { display: none; } .lb-img-wrap { padding: 20px 50px; } }
    @media(max-width:600px) { .masonry { columns: 1; } }
  </style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-dot" id="cursorDot"></div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <header class="top-bar">
      <h1 class="top-bar__title">Фотогалерея</h1>
      <div class="top-bar__actions">
        <div class="view-btns">
          <button class="vbtn active" onclick="setView(3,this)" title="3 колонки">⊞</button>
          <button class="vbtn" onclick="setView(2,this)" title="2 колонки">⊟</button>
          <button class="vbtn" onclick="setView(1,this)" title="1 колонка">▬</button>
        </div>
        <button class="btn btn--primary" onclick="document.getElementById('uploadInput').click()" style="padding:10px 20px;font-size:0.85rem">
          + Загрузить фото
        </button>
        <input type="file" id="uploadInput" multiple accept="image/*" style="display:none" onchange="handleUpload(this.files)">
      </div>
    </header>

    <div class="page-body">
      <!-- Drag & drop upload hint -->
      <div class="upload-zone-area" id="uploadZone" style="display:none">
        <div style="font-size:2.5rem">📤</div>
        <h3>Перетащите фото сюда</h3>
        <p style="font-size:0.85rem">JPEG, PNG, WebP · до 10 MB каждое</p>
      </div>

      <!-- Controls -->
      <div class="gallery-controls">
        <div class="gallery-search">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:var(--mist);fill:none;stroke-width:2;flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Поиск по подписи..." maxlength="200" oninput="filterPhotos()">
        </div>
        <select id="sortSelect" onchange="filterPhotos()" style="padding:9px 14px;border:1.5px solid var(--sand);border-radius:10px;font-family:var(--font-sans);font-size:0.83rem;outline:none;background:var(--white)">
          <option value="newest">Новые сначала</option>
          <option value="oldest">Старые сначала</option>
        </select>
      </div>

      <!-- Trip filter pills -->
      <div class="trip-pills" id="tripPills">
        <span class="trip-pill active" data-trip="" onclick="filterByTrip('',this)">🌍 Все</span>
      </div>

      <!-- Stats -->
      <div class="gallery-stats">
        <span>📸 <strong id="photoCount">0</strong> фотографий</span>
        <span>🗺️ <strong id="tripCount">0</strong> поездок</span>
      </div>

      <!-- Loading -->
      <div id="galleryLoading" style="text-align:center;padding:60px;color:var(--mist)">
        <div class="spinner" style="margin:0 auto 16px"></div>
        <p>Загружаем фотографии...</p>
      </div>

      <!-- Masonry grid -->
      <div id="galleryGrid" class="masonry" style="display:none"></div>

      <!-- Empty state -->
      <div id="galleryEmpty" class="gallery-empty" style="display:none">
        <div style="font-size:3.5rem;margin-bottom:16px">📷</div>
        <h3 style="font-family:var(--font-serif);font-size:1.5rem;margin-bottom:10px;color:var(--ink)">Фотографий пока нет</h3>
        <p>Загрузите фотографии из своих путешествий</p>
        <button onclick="document.getElementById('uploadInput').click()" class="btn btn--primary" style="margin-top:20px">+ Загрузить фото</button>
      </div>
    </div>
  </main>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()" title="Закрыть (Esc)">✕</button>
  <button class="lb-nav lb-prev" onclick="lbNav(-1)" title="Назад (←)">‹</button>
  <button class="lb-nav lb-next" onclick="lbNav(1)"  title="Вперёд (→)">›</button>

  <div class="lb-content">
    <div class="lb-img-wrap">
      <img id="lbImg" src="" alt="">
    </div>
    <div class="lb-info">
      <div class="lb-info__caption" id="lbCaption"></div>
      <div class="lb-info__meta" id="lbMeta"></div>
      <div class="lb-info__actions">
        <button class="lb-btn" onclick="lbDownload()">⬇ Скачать оригинал</button>
        <button class="lb-btn lb-btn--delete" id="lbDeleteBtn" onclick="lbDelete()" style="display:none">✕ Удалить фото</button>
      </div>
    </div>
  </div>
  <div class="lb-count" id="lbCount"></div>
</div>

<script src="../js/validate.js"></script>
<script src="../js/main.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/avatar.js"></script>
<script>
if (!Auth.getToken()) window.location.href = 'login.html';

let allPhotos = [];     // все фото [{id,url,thumb_url,caption,trip_id,trip_title,...}]
let displayed = [];     // после фильтров
let currentLbIdx = 0;
let activeTripId = '';
let colCount = 3;
let userTrips = [];

// ── Load data ──────────────────────────────────────
async function loadGallery() {
  try {
    // 1. Загружаем поездки пользователя
    userTrips = await apiFetch('/trips/my');

    // 2. Для каждой поездки загружаем фото
    const photoPromises = userTrips.map(async t => {
      try {
        const photos = await apiFetch(`/trips/${t.id}/photos`);
        return photos.map(p => ({
          ...p,
          trip_id:    t.id,
          trip_title: t.title,
          trip_flag:  t.flag_emoji || '',
          trip_country: t.country_name || '',
        }));
      } catch { return []; }
    });

    const results = await Promise.all(photoPromises);
    allPhotos = results.flat().sort((a,b) => b.id - a.id);

    // 3. Строим фильтр-таблетки по поездкам
    buildTripPills();

    // 4. Рендерим
    displayed = [...allPhotos];
    renderGallery();

    // Счётчики
    document.getElementById('photoCount').textContent = allPhotos.length;
    document.getElementById('tripCount').textContent  = userTrips.filter(t => t.photo_count > 0).length;

  } catch(err) {
    console.error(err);
    document.getElementById('galleryLoading').innerHTML = `<p style="color:var(--rust)">Ошибка загрузки: ${err.message}</p>`;
    return;
  }

  document.getElementById('galleryLoading').style.display = 'none';
}

function buildTripPills() {
  const el = document.getElementById('tripPills');
  const tripsWithPhotos = userTrips.filter(t => t.photo_count > 0 || allPhotos.some(p => p.trip_id === t.id));
  const pills = tripsWithPhotos.map(t =>
    `<span class="trip-pill" data-trip="${t.id}" onclick="filterByTrip('${t.id}',this)">${t.flag_emoji||'🌍'} ${t.title}</span>`
  ).join('');
  el.innerHTML = `<span class="trip-pill active" data-trip="" onclick="filterByTrip('',this)">🌍 Все</span>${pills}`;
}

// ── Filter ─────────────────────────────────────────
function filterByTrip(tripId, btn) {
  activeTripId = tripId;
  document.querySelectorAll('.trip-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterPhotos();
}

function filterPhotos() {
  const q    = document.getElementById('searchInput').value.toLowerCase().trim();
  const sort = document.getElementById('sortSelect').value;

  displayed = allPhotos.filter(p =>
    (!activeTripId || String(p.trip_id) === String(activeTripId)) &&
    (!q || (p.caption||'').toLowerCase().includes(q) || (p.trip_title||'').toLowerCase().includes(q))
  );

  if (sort === 'oldest') displayed.sort((a,b) => a.id - b.id);
  else displayed.sort((a,b) => b.id - a.id);

  renderGallery();
  document.getElementById('photoCount').textContent = displayed.length;
}

// ── Render grid ────────────────────────────────────
function renderGallery() {
  const grid  = document.getElementById('galleryGrid');
  const empty = document.getElementById('galleryEmpty');

  if (!displayed.length) {
    grid.style.display  = 'none';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.style.display  = '';
  grid.style.columns  = `${colCount}`;

  grid.innerHTML = displayed.map((p, i) => `
    <div class="masonry-item" onclick="openLightbox(${i})">
      ${p.trip_title ? `<span class="masonry-item__trip-tag">${p.trip_flag||''} ${p.trip_title}</span>` : ''}
      <img src="${p.thumb_url || p.url}" alt="${p.caption||''}" loading="lazy"
           onerror="this.src='${p.url}'">
      <div class="masonry-item__overlay">
        <div class="masonry-item__caption">${p.caption || (p.trip_title ? p.trip_flag + ' ' + p.trip_title : '')}</div>
        <div class="masonry-item__actions">
          <button onclick="event.stopPropagation();lbDownloadDirect('${p.url}')">⬇</button>
          <button onclick="event.stopPropagation();deletePhoto(${p.id},event)" style="color:rgba(255,100,80,0.8)">✕</button>
        </div>
      </div>
    </div>`).join('');
}

// ── View cols ──────────────────────────────────────
function setView(cols, btn) {
  colCount = cols;
  document.querySelectorAll('.vbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const grid = document.getElementById('galleryGrid');
  grid.style.columns = `${cols}`;
}

// ── Lightbox ───────────────────────────────────────
function openLightbox(idx) {
  currentLbIdx = idx;
  const lb = document.getElementById('lightbox');
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
  // Скрываем кастомный курсор в lightbox — показываем системный
  document.getElementById('cursor').style.display    = 'none';
  document.getElementById('cursorDot').style.display = 'none';
  updateLightbox();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('cursor').style.display    = '';
  document.getElementById('cursorDot').style.display = '';
}

function lbNav(dir) {
  currentLbIdx = (currentLbIdx + dir + displayed.length) % displayed.length;
  updateLightbox();
}

function updateLightbox() {
  const p = displayed[currentLbIdx];
  if (!p) return;
  const img = document.getElementById('lbImg');
  img.src = p.url;
  img.alt = p.caption || '';

  document.getElementById('lbCaption').textContent = p.caption || (p.trip_title ? p.trip_title : 'Без подписи');
  document.getElementById('lbMeta').innerHTML = [
    p.trip_flag && p.trip_title ? `${p.trip_flag} ${p.trip_title}` : '',
    p.trip_country || '',
    p.taken_at ? new Date(p.taken_at).toLocaleDateString('ru',{day:'numeric',month:'long',year:'numeric'}) : '',
    p.width && p.height ? `${p.width} × ${p.height}` : '',
  ].filter(Boolean).join('<br>');

  document.getElementById('lbCount').textContent = `${currentLbIdx + 1} / ${displayed.length}`;
  document.getElementById('lbDeleteBtn').style.display = 'flex';
}

function lbDownload() {
  const p = displayed[currentLbIdx];
  if (!p) return;
  lbDownloadDirect(p.url);
}
function lbDownloadDirect(url) {
  const a = document.createElement('a');
  a.href = url; a.download = 'wanderlog-photo.jpg'; a.target = '_blank'; a.click();
}

async function lbDelete() {
  const p = displayed[currentLbIdx];
  if (!p) return;
  if (!confirm('Удалить фото?')) return;
  await deletePhoto(p.id);
}

async function deletePhoto(id, event) {
  event?.stopPropagation();
  try {
    await apiFetch(`/photos/${id}`, { method: 'DELETE' });
    allPhotos = allPhotos.filter(p => p.id !== id);
    filterPhotos();
    document.getElementById('photoCount').textContent = displayed.length;
    toast('Фото удалено', 'success');
    if (document.getElementById('lightbox').classList.contains('open')) {
      if (!displayed.length) closeLightbox();
      else { currentLbIdx = Math.min(currentLbIdx, displayed.length - 1); updateLightbox(); }
    }
  } catch(e) { toast(e.message, 'error'); }
}

// ── Upload ─────────────────────────────────────────
async function handleUpload(files) {
  if (!files?.length) return;

  // Нужно выбрать поездку
  const tripsWithDates = userTrips.filter(t => t.id);
  if (!tripsWithDates.length) {
    toast('Сначала создайте хотя бы одну поездку', 'error');
    return;
  }

  // Простой выбор поездки через prompt (в production — модалка)
  const options = tripsWithDates.map((t,i) => `${i+1}. ${t.title}`).join('\n');
  const choice  = prompt(`Выберите номер поездки для загрузки фото:\n\n${options}`);
  if (!choice) return;
  const idx = parseInt(choice) - 1;
  if (idx < 0 || idx >= tripsWithDates.length) { toast('Неверный номер', 'error'); return; }
  const trip = tripsWithDates[idx];

  const arr = Array.from(files);
  toast(`Загружаем ${arr.length} фото в «${trip.title}»...`, 'default');

  const fd = new FormData();
  arr.forEach(f => fd.append('photos', f));

  try {
    const res = await fetch(`${API}/trips/${trip.id}/photos`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${Auth.getToken()}` },
      body: fd,
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Ошибка загрузки');

    // Добавляем в массив
    const newPhotos = data.map(p => ({ ...p, trip_id: trip.id, trip_title: trip.title, trip_flag: trip.flag_emoji || '' }));
    allPhotos = [...newPhotos, ...allPhotos];
    filterPhotos();
    buildTripPills();
    document.getElementById('photoCount').textContent = displayed.length;
    toast(`✓ Загружено ${data.length} фото`, 'success');
  } catch(e) { toast('Ошибка: ' + e.message, 'error'); }

  // Сбросить input
  document.getElementById('uploadInput').value = '';
}

// ── Drag & drop ────────────────────────────────────
const mainContent = document.querySelector('.main-content');
mainContent.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('uploadZone').style.display = 'block'; });
mainContent.addEventListener('dragleave', e => { if (!mainContent.contains(e.relatedTarget)) document.getElementById('uploadZone').style.display = 'none'; });
mainContent.addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('uploadZone').style.display = 'none';
  if (e.dataTransfer.files?.length) handleUpload(e.dataTransfer.files);
});

// ── Keyboard ───────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape')     { closeLightbox(); return; }
  if (e.key === 'ArrowLeft')  lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
});

// ── Sidebar user ───────────────────────────────────
async function loadSidebarUser() {
  try {
    const u = await apiFetch('/auth/me');
    const el = document.getElementById('userName'); if(el) el.textContent = u.first_name || u.username;
    const av = document.getElementById('userAvatar'); if(av && u.avatar_url) av.src = u.avatar_url;
  } catch {}
}

document.addEventListener('DOMContentLoaded', () => {
  loadGallery();
});
</script>
</body>
</html>
